<!DOCTYPE html><html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>App Commande d'œufs</title>
  <style>
    body {font-family: Arial; background:#f5f5f5; margin:0; padding:0; -webkit-user-select:none;}
    header {background:#f4b400; color:white; text-align:center; padding:15px}
    .container {max-width:520px; margin:auto; background:white; padding:20px; margin-top:20px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.1)}
    input, select {width:100%; padding:12px; margin:10px 0; border-radius:6px; border:1px solid #ccc; font-size:16px}
    button {width:100%; padding:15px; background:#28a745; color:white; border:none; border-radius:6px; font-size:18px; margin-top:10px}
    .total {font-weight:bold; font-size:18px}
    .history {margin-top:20px; background:#fafafa; padding:10px; border-radius:8px; max-height:200px; overflow-y:auto}
    h1,h2,h3 {margin:5px 0}
  </style>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
</head>
<body><header>
  <h1>🥚 Mon Élevage d'Œufs</h1>
  <p>Commande rapide & livraison gratuite 🚚</p>
</header><div class="container">
  <h2>Passer une commande</h2>  <form id="orderForm">
    <input type="text" id="name" placeholder="Nom" required>
    <input type="text" id="phone" placeholder="Téléphone" required><select id="type">
  <option value="2000">Plateau (2000 FCFA)</option>
  <option value="100">Unité (100 FCFA)</option>
</select>

<input type="number" id="quantity" value="1" min="1">

<p class="total">Total : <span id="total">2000</span> FCFA</p>

<select id="payment">
  <option>MTN MoMo</option>
  <option>Moov Money</option>
  <option>Celtiis Cash</option>
  <option>Paiement à la livraison</option>
</select>

<button type="button" onclick="getLocation()">📍 Ajouter ma position</button>
<p id="location"></p>

<button type="submit">Commander</button>

  </form>  <div class="history">
    <h3>📦 Historique des commandes</h3>
    <ul id="historyList"></ul>
  </div>
</div><script>
const type = document.getElementById('type');
const quantity = document.getElementById('quantity');
const total = document.getElementById('total');
const historyList = document.getElementById('historyList');

function updateTotal(){ total.textContent = type.value * quantity.value; }

type.addEventListener('change', updateTotal);
quantity.addEventListener('input', updateTotal);

function getLocation(){
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(pos=>{
      const coords = pos.coords.latitude + ',' + pos.coords.longitude;
      document.getElementById('location').textContent = 'Position: '+coords;
      localStorage.setItem('location', coords);
    });
  }
}

function saveHistory(order){
  let history = JSON.parse(localStorage.getItem('orders')) || [];
  history.push(order);
  localStorage.setItem('orders', JSON.stringify(history));
  displayHistory();
}

function displayHistory(){
  let history = JSON.parse(localStorage.getItem('orders')) || [];
  historyList.innerHTML = '';
  history.forEach(o=>{
    let li = document.createElement('li');
    li.textContent = o;
    historyList.appendChild(li);
  });
}


document.getElementById('orderForm').addEventListener('submit', function(e){
  e.preventDefault();

  const name = document.getElementById('name').value;
  const phone = document.getElementById('phone').value;
  const qty = quantity.value;
  const payment = document.getElementById('payment').value;
  const location = localStorage.getItem('location') || 'non précisée';

  const orderText = `${name} - ${qty} oeufs - ${payment} - Livraison gratuite`; 
  saveHistory(orderText);

  const message = `Bonjour, ${name} commande ${qty} oeufs. Mode de paiement: ${payment}. Livraison gratuite. Position: ${location}. Tel: ${phone}`;

  const whatsappUrl = `https://wa.me/2290141227270?text=${encodeURIComponent(message)}`;
  window.open(whatsappUrl, '_blank');

  alert('Commande enregistrée ! Paiement: ' + payment + ' | Livraison gratuite 🚚');
});

window.onload = displayHistory;
</script></body>
</html>
